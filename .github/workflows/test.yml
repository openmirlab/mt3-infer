name: Test

# Runs the unit test suite (fast, no checkpoint downloads) on every push and
# pull request. Added as part of the ADOPT campaign (Phase 0) -- previously
# only publish.yml existed and no test job ran in CI at all.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies (dev + full extras)
        run: uv sync --extra dev --extra full

      - name: Run unit tests
        run: uv run pytest mt3_infer/tests/ -q
