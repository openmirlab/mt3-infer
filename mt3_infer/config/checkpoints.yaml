# MT3-Infer Model Registry
# Version: 0.1.1
# Last Updated: 2025-11-14

models:
  mr_mt3:
    name: "MR-MT3"
    description: "Multi-instrument MT3 variant optimized for speed (57x real-time)"
    framework: "pytorch"
    adapter_class: "mt3_infer.adapters.mr_mt3.MRMT3Adapter"
    checkpoint:
      path: ".mt3_checkpoints/mr_mt3/mt3.pth"
      size_mb: 176.0
      format: "pytorch"
      download:
        source_type: "url"
        source_url: "https://huggingface.co/gudgud1014/MR-MT3/resolve/main/mt3.pth"
        # Verified 2026-07-11 by downloading fresh from source_url and hashing.
        sha256: "b8a3807ed265059abd25ad7f68142c06c35e8f6144dcaa45bd55946a3745398f"
    metadata:
      vocab_size: 388
      max_seq_len: 1024
      sample_rate: 16000
      verified_on: "2025-10-06"
      performance:
        speed_x_realtime: 57.0
        peak_gpu_memory_mb: 269
        notes_detected: 116  # HappySounds test
    best_for:
      - "Real-time applications"
      - "Low-latency requirements"
      - "Embedded systems"
      - "Batch processing"

  mt3_pytorch:
    name: "MT3-PyTorch"
    description: "Official MT3 architecture in PyTorch (best accuracy, 12x real-time)"
    framework: "pytorch"
    adapter_class: "mt3_infer.adapters.mt3_pytorch.MT3PyTorchAdapter"
    checkpoint:
      path: ".mt3_checkpoints/mt3_pytorch"
      size_mb: 176.0
      format: "pytorch"
      download:
        source_type: "git_lfs"
        source_url: "https://github.com/kunato/mt3-pytorch"
        branch: "master"
        depth: 1
        target_path: "pretrained"
        # Verified 2026-07-11 via a fresh `git lfs pull` of pretrained/mt3.pth
        # from source_url. NOTE: not currently enforced at download time --
        # clone_git_lfs_repo() (utils/download.py) doesn't verify checksums
        # after cloning, unlike the `url` download path. Recorded here for
        # provenance/audit; wiring verification into the git_lfs path is a
        # separate, larger change than this campaign's "record where feasible."
        # Surprise: this hash is IDENTICAL to mr_mt3's sha256 above -- verified
        # independently against both live sources, not a caching bug. The two
        # upstream projects apparently ship the same underlying checkpoint.
        sha256: "b8a3807ed265059abd25ad7f68142c06c35e8f6144dcaa45bd55946a3745398f"
    metadata:
      vocab_size: 1536
      max_seq_len: 1024
      sample_rate: 16000
      verified_on: "2025-10-06"
      performance:
        speed_x_realtime: 12.37
        peak_gpu_memory_mb: 208
        notes_detected: 147  # HappySounds test (+27% vs MR-MT3)
    best_for:
      - "Studio music production"
      - "Accuracy-critical applications"
      - "Multi-instrument separation"
      - "General-purpose transcription"
      - "Research and benchmarking (official baseline)"

  yourmt3:
    name: "YourMT3"
    description: "Advanced multi-task MT3 with 8-stem separation (Perceiver-TF + MoE)"
    framework: "pytorch"  # no longer needs pytorch_lightning/lightning at runtime (see LightningModuleShim)
    adapter_class: "mt3_infer.adapters.yourmt3.YourMT3Adapter"
    checkpoint:
      path: ".mt3_checkpoints/yourmt3/mc13_256_g4_all_v7_mt3f_sqr_rms_moe_wf4_n8k2_silu_rope_rp_b36_nops/last.ckpt"
      size_mb: 536.0
      format: "pytorch_lightning"  # the .ckpt file itself is still Lightning-shaped (hyper_parameters, callbacks, etc.); only the runtime dependency was removed
      download:
        source_type: "git_lfs"
        source_url: "https://huggingface.co/spaces/mimbres/YourMT3"
        # Verified 2026-07-11 via a fresh `git lfs pull` of the checkpoint from
        # source_url. Same caveat as mt3_pytorch above: git_lfs downloads
        # aren't checksum-verified at download time yet, recorded for
        # provenance only.
        sha256: "ae38e415c79efd5592dcb9b658cdb99ddb11d4c4e1eaa364cab04a052473fc25"
        branch: "main"
        depth: 1
        target_path: "amt/logs/2024/mc13_256_g4_all_v7_mt3f_sqr_rms_moe_wf4_n8k2_silu_rope_rp_b36_nops/checkpoints/last.ckpt"
    metadata:
      model_variant: "YPTF.MoE+Multi (noPS)"
      vocab_size: 1536
      max_seq_len: 1024
      sample_rate: 16000
      num_stems: 8
      encoder: "Perceiver-TF"
      decoder: "Multi-T5 (26 layers)"
      architecture: "MoE (8 experts, top-k=2)"
      verified_on: "2025-10-07"
      performance:
        speed_x_realtime: 15.0  # Estimated, to be tested
        peak_gpu_memory_mb: 400  # Estimated
        notes_detected: null  # To be tested
    best_for:
      - "Multi-instrument separation (8 stems)"
      - "Detailed music transcription"
      - "Multi-task scenarios"
      - "Research on advanced MT3 architectures"

# Default model
default: "mt3_pytorch"  # Recommended: best balance of speed and accuracy

# Model aliases for convenience
aliases:
  default: "mt3_pytorch"
  fast: "mr_mt3"
  accurate: "mt3_pytorch"
  multitask: "yourmt3"
  official: "mt3_pytorch"
  baseline: "mt3_pytorch"
